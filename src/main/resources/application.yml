spring:
  application:
    name: finance
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/finance}
    username: ${DB_USERNAME:finance}
    password: ${DB_PASSWORD:finance}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  jackson:
    time-zone: America/Sao_Paulo
    deserialization:
      fail-on-unknown-properties: true

springdoc:
  swagger-ui:
    path: /swagger

server:
  error:
    include-message: never
    include-stacktrace: never

app:
  security:
    jwt-secret: ${JWT_SECRET:0123456789012345678901234567890123456789012345678901234567890123}
    jwt-expiration-minutes: 60
    refresh-expiration-days: 7
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  login-rate-limit:
    max-attempts: 5
    window-minutes: 15

logging:
  level:
    root: INFO
    com.example.finance: INFO
