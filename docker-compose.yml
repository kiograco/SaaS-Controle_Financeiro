services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-finance}
      POSTGRES_USER: ${DB_USERNAME:-finance}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-finance}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      - postgres
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-finance}
      DB_USERNAME: ${DB_USERNAME:-finance}
      DB_PASSWORD: ${DB_PASSWORD:-finance}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://localhost:3000}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - app
    ports:
      - "4200:80"

volumes:
  postgres_data:
